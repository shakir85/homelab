name: Helmfile Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    container:
      image: ghcr.io/shakir85/cicd-tools:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_K3S_MAIN }}" > "${GITHUB_WORKSPACE}/kubeconfig"

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest' 
      
      - name: Test deployment 
        run: kubectl run test-nginx --image nginx:latest -n apps
        
